card_anatomy:
  media: proof or emotion
  title: names the decision object
  decision_label: tells the user what this card helps decide
  facts: hard proof, not adjectives
  microcopy: short human explanation
  action: next step if useful
  state: default, featured, limited, unavailable, coming_soon, needs_confirmation
